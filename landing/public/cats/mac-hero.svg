<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Mac the Cat - Hero illustration, sitting on laptop -->
  <defs>
    <linearGradient id="macFur" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B7FD7"/>
      <stop offset="100%" style="stop-color:#5568C8"/>
    </linearGradient>
    <linearGradient id="laptop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E8"/>
      <stop offset="100%" style="stop-color:#C0C0C0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Laptop base -->
  <rect x="50" y="200" width="200" height="12" rx="2" fill="url(#laptop)" filter="url(#shadow)"/>
  <ellipse cx="150" cy="206" rx="15" ry="3" fill="#999"/>
  
  <!-- Laptop screen -->
  <rect x="60" y="120" width="180" height="80" rx="4" fill="#333" filter="url(#shadow)"/>
  <rect x="65" y="125" width="170" height="70" rx="2" fill="#1a1a2e"/>
  <!-- Screen content - code -->
  <rect x="72" y="132" width="40" height="4" rx="1" fill="#FF6B9D"/>
  <rect x="72" y="140" width="80" height="4" rx="1" fill="#C3E88D"/>
  <rect x="72" y="148" width="60" height="4" rx="1" fill="#82AAFF"/>
  <rect x="72" y="156" width="90" height="4" rx="1" fill="#FFCB6B"/>
  <rect x="72" y="164" width="45" height="4" rx="1" fill="#C792EA"/>
  
  <!-- Cat body sitting on laptop -->
  <ellipse cx="150" cy="175" rx="55" ry="30" fill="url(#macFur)"/>
  
  <!-- Cat tail curling around -->
  <path d="M205 175 Q230 160 235 130 Q238 110 225 105" stroke="url(#macFur)" stroke-width="14" fill="none" stroke-linecap="round"/>
  
  <!-- Cat head -->
  <circle cx="150" cy="105" r="50" fill="url(#macFur)"/>
  
  <!-- Ears -->
  <path d="M105 70 L110 25 L135 65 Z" fill="url(#macFur)"/>
  <path d="M195 70 L190 25 L165 65 Z" fill="url(#macFur)"/>
  <path d="M110 65 L113 35 L130 62 Z" fill="#8B9FE8"/>
  <path d="M190 65 L187 35 L170 62 Z" fill="#8B9FE8"/>
  
  <!-- Eyes - happy, content -->
  <path d="M120 95 Q130 85 140 95" stroke="#2D1B14" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M160 95 Q170 85 180 95" stroke="#2D1B14" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Blush -->
  <ellipse cx="115" cy="105" rx="10" ry="6" fill="#FF9999" opacity="0.4"/>
  <ellipse cx="185" cy="105" rx="10" ry="6" fill="#FF9999" opacity="0.4"/>
  
  <!-- Nose -->
  <ellipse cx="150" cy="115" rx="7" ry="5" fill="#FF8080"/>
  
  <!-- Mouth - happy smile -->
  <path d="M138 125 Q150 135 162 125" stroke="#2D1B14" stroke-width="2.5" fill="none"/>
  <line x1="150" y1="120" x2="150" y2="128" stroke="#2D1B14" stroke-width="2"/>
  
  <!-- Whiskers -->
  <line x1="95" y1="108" x2="120" y2="112" stroke="#4A5AB8" stroke-width="2"/>
  <line x1="92" y1="118" x2="120" y2="118" stroke="#4A5AB8" stroke-width="2"/>
  <line x1="95" y1="128" x2="120" y2="124" stroke="#4A5AB8" stroke-width="2"/>
  <line x1="180" y1="112" x2="205" y2="108" stroke="#4A5AB8" stroke-width="2"/>
  <line x1="180" y1="118" x2="208" y2="118" stroke="#4A5AB8" stroke-width="2"/>
  <line x1="180" y1="124" x2="205" y2="128" stroke="#4A5AB8" stroke-width="2"/>
  
  <!-- Front paws on laptop -->
  <ellipse cx="115" cy="195" rx="18" ry="10" fill="url(#macFur)"/>
  <ellipse cx="185" cy="195" rx="18" ry="10" fill="url(#macFur)"/>
  <!-- Paw details -->
  <ellipse cx="108" cy="198" rx="4" ry="3" fill="#8B9FE8"/>
  <ellipse cx="115" cy="200" rx="4" ry="3" fill="#8B9FE8"/>
  <ellipse cx="122" cy="198" rx="4" ry="3" fill="#8B9FE8"/>
  <ellipse cx="178" cy="198" rx="4" ry="3" fill="#8B9FE8"/>
  <ellipse cx="185" cy="200" rx="4" ry="3" fill="#8B9FE8"/>
  <ellipse cx="192" cy="198" rx="4" ry="3" fill="#8B9FE8"/>
  
  <!-- Sparkles -->
  <g fill="#FFD700">
    <path d="M50 60 L52 55 L54 60 L59 62 L54 64 L52 69 L50 64 L45 62 Z"/>
    <path d="M250 80 L252 76 L254 80 L258 82 L254 84 L252 88 L250 84 L246 82 Z"/>
    <path d="M40 140 L41 137 L42 140 L45 141 L42 142 L41 145 L40 142 L37 141 Z"/>
  </g>
  
  <!-- Speech bubble -->
  <path d="M220 50 Q220 30 250 30 Q280 30 280 50 Q280 70 250 70 Q235 70 225 80 Q230 70 220 70 Q220 60 220 50" fill="white" stroke="#DDD" stroke-width="1.5"/>
  <text x="250" y="55" text-anchor="middle" font-size="14" fill="#333">meow!</text>
</svg>