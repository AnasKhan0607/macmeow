<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Needy Cat - Big teary eyes, reaching out, clingy -->
  <defs>
    <linearGradient id="needyFur" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB5C5"/>
      <stop offset="100%" style="stop-color:#F08080"/>
    </linearGradient>
  </defs>
  
  <!-- Body -->
  <ellipse cx="100" cy="150" rx="48" ry="35" fill="url(#needyFur)"/>
  
  <!-- Reaching paws -->
  <ellipse cx="55" cy="125" rx="12" ry="8" fill="url(#needyFur)" transform="rotate(-30 55 125)"/>
  <ellipse cx="145" cy="125" rx="12" ry="8" fill="url(#needyFur)" transform="rotate(30 145 125)"/>
  <!-- Paw pads -->
  <circle cx="48" cy="120" r="3" fill="#FFD4D4"/>
  <circle cx="162" cy="120" r="3" fill="#FFD4D4"/>
  
  <!-- Head -->
  <circle cx="100" cy="82" r="45" fill="url(#needyFur)"/>
  
  <!-- Ears -->
  <path d="M58 55 L62 15 L82 50 Z" fill="url(#needyFur)"/>
  <path d="M142 55 L138 15 L118 50 Z" fill="url(#needyFur)"/>
  <path d="M62 50 L64 22 L79 47 Z" fill="#FFDEDE"/>
  <path d="M138 50 L136 22 L121 47 Z" fill="#FFDEDE"/>
  
  <!-- Eyes - huge, teary, pleading -->
  <ellipse cx="75" cy="78" rx="18" ry="22" fill="white"/>
  <ellipse cx="125" cy="78" rx="18" ry="22" fill="white"/>
  <circle cx="75" cy="82" r="14" fill="#8B4557"/>
  <circle cx="125" cy="82" r="14" fill="#8B4557"/>
  <!-- Sparkles/tears -->
  <circle cx="80" cy="75" r="5" fill="white"/>
  <circle cx="130" cy="75" r="5" fill="white"/>
  <circle cx="72" cy="82" r="2.5" fill="white" opacity="0.7"/>
  <circle cx="122" cy="82" r="2.5" fill="white" opacity="0.7"/>
  
  <!-- Tear drops -->
  <path d="M60 92 Q58 102 60 108" stroke="#87CEEB" stroke-width="3" fill="none" stroke-linecap="round"/>
  <ellipse cx="60" cy="110" rx="3" ry="2" fill="#87CEEB"/>
  <path d="M140 92 Q142 102 140 108" stroke="#87CEEB" stroke-width="3" fill="none" stroke-linecap="round"/>
  <ellipse cx="140" cy="110" rx="3" ry="2" fill="#87CEEB"/>
  
  <!-- Eyebrows - worried, upward slant -->
  <path d="M55 58 Q70 52 92 62" stroke="#8B4557" stroke-width="2.5" fill="none"/>
  <path d="M108 62 Q130 52 145 58" stroke="#8B4557" stroke-width="2.5" fill="none"/>
  
  <!-- Nose -->
  <ellipse cx="100" cy="98" rx="5" ry="3.5" fill="#FF8080"/>
  
  <!-- Mouth - wobbly/pouty -->
  <path d="M90 110 Q95 115 100 112 Q105 115 110 110" stroke="#8B4557" stroke-width="2" fill="none"/>
  
  <!-- Whiskers -->
  <line x1="48" y1="92" x2="68" y2="95" stroke="#8B4557" stroke-width="1.5"/>
  <line x1="45" y1="102" x2="68" y2="102" stroke="#8B4557" stroke-width="1.5"/>
  <line x1="132" y1="95" x2="152" y2="92" stroke="#8B4557" stroke-width="1.5"/>
  <line x1="132" y1="102" x2="155" y2="102" stroke="#8B4557" stroke-width="1.5"/>
  
  <!-- "Don't leave!" text -->
  <text x="100" cy="20" text-anchor="middle" font-size="11" fill="#8B4557" font-weight="bold">pls come back</text>
  
  <!-- Hearts floating -->
  <path d="M35 45 C35 40 42 40 42 45 C42 50 35 55 35 55 C35 55 28 50 28 45 C28 40 35 40 35 45" fill="#FFB5C5" opacity="0.6"/>
  <path d="M170 50 C170 46 175 46 175 50 C175 54 170 58 170 58 C170 58 165 54 165 50 C165 46 170 46 170 50" fill="#FFB5C5" opacity="0.6"/>
</svg>