name: Sentient
options:
  bundleIdPrefix: com.anaskhan
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: Sentient
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: YES

targets:
  Sentient:
    type: application
    platform: macOS
    sources:
      - path: Sentient
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: Sentient/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.anaskhan.sentient
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        # Menu bar only app
        LSUIElement: YES
    info:
      path: Sentient/Info.plist
      properties:
        CFBundleName: Sentient
        CFBundleDisplayName: Sentient
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundlePackageType: APPL
        CFBundleExecutable: $(EXECUTABLE_NAME)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSUIElement: true
        NSPrincipalClass: NSApplication
        NSHumanReadableCopyright: "Copyright © 2026 Anas Khan. All rights reserved."
        NSCameraUsageDescription: "Sentient uses the camera to detect when you're present (optional feature)."
    entitlements:
      path: Sentient/Sentient.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.device.camera: true
